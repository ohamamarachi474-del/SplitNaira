name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm i --no-audit --no-fund
      - run: npm run lint -- -w frontend --max-warnings=10
      - run: npm run build -w frontend
      - run: npm run test -w frontend

  backend:
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm i --no-audit --no-fund
      - run: npm run deps:check -w backend
      - run: npm run lint -w backend
      - run: npm run build -w backend
      - run: npm run test -w backend -- --reporter=verbose
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run deps:check
      - run: npm run lint
      - run: npm run build
      - run: npm run test:compat -- --reporter=verbose
      - run: npm run test -- --reporter=verbose

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo test --locked
